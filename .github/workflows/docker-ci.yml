name: Docker CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  docker-build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4.4.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.12.0

    - name: Build test Docker image
      uses: docker/build-push-action@v6.19.2
      with:
        context: .
        target: test
        tags: gmail-calendar-sync:test
        load: true
        cache-from: type=gha,scope=docker-test
        cache-to: type=gha,scope=docker-test,mode=max

    - name: Run tests in Docker container
      run: |
        docker run --rm \
          -e GITHUB_ACTIONS=true \
          gmail-calendar-sync:test \
          python -m pytest tests/ -v --tb=short

    - name: Build production Docker image
      uses: docker/build-push-action@v6.19.2
      with:
        context: .
        tags: gmail-calendar-sync:latest
        load: true
        cache-from: type=gha,scope=docker-production
        cache-to: type=gha,scope=docker-production,mode=max

    - name: Analyze image size
      run: |
        size=$(docker image inspect gmail-calendar-sync:latest --format='{{.Size}}' | awk '{print $1/1024/1024}')
        echo "## 🐳 Docker Image Analysis" >> $GITHUB_STEP_SUMMARY
        echo "- 📏 Image size: ${size%.*} MB" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Build successful" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Test execution passed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Health check completed" >> $GITHUB_STEP_SUMMARY

    - name: Scan for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'gmail-calendar-sync:latest'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
      continue-on-error: true

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3.37.3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
